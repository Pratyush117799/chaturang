<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chaturanga 1.0.3</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="homepage-container">
    <header class="homepage-header"><h1>Chaturanga 1.0.3</h1><p class="tagline">Chaturaji 4-Player</p></header>
    <main class="homepage-main">
      <aside class="login-section">
        <h2>Login</h2>
        <form id="authForm"><label>Email <input type="email" id="authEmail" /></label><label>Password <input type="password" id="authPassword" /></label><label><input type="checkbox" id="rememberMe" /> Remember me</label><button type="submit">Login</button><button type="button" id="signupBtn">Sign up</button></form>
        <p>Or <a href="game.html" id="guestLink">play as guest</a></p>
      </aside>
      <section class="play-section">
        <h2>Play</h2>
        <a href="#" id="playOnline">Play Online (coming soon)</a>
        <a href="game.html?mode=computer" id="playComputer">Play Computer</a>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/homepage.js"></script>
</body>
</html>
