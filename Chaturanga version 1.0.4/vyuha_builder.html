<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chaturanga — Vyuha Formation Builder v1.0.5</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="css/styles.css"/>
<script>(function(){var t=localStorage.getItem('chaturanga_theme');if(t&&t!=='classic')document.documentElement.className='theme-'+t;})();</script>
<style>
:root{--gold:#c9a84c;--gold-lt:#e8c96a;--dark:#0f0c07;--dark2:#1a1306;--dark3:#231a08;--border:rgba(201,168,76,0.22);--sq-light:#f0d9b5;--sq-dark:#b58863;--text:#f5ead0;--muted:#7a6644;--red:#e74c3c;--blue:#3498db;--green:#27ae60;--yellow:#f39c12}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Top bar ── */
.top-bar{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);font-weight:700;text-decoration:none}
.ver-badge{font-size:.7rem;color:var(--muted);background:rgba(201,168,76,.12);padding:2px 8px;border-radius:12px}
.phase-label{font-size:.78rem;color:var(--gold-lt);background:rgba(201,168,76,.15);padding:4px 12px;border-radius:20px}
.top-bar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.nav-icon-btn{background:transparent;border:none;color:var(--muted);padding:6px 8px;cursor:pointer;font-size:.9rem;border-radius:6px;transition:color .2s}
.nav-icon-btn:hover{color:var(--gold)}

/* ── Tier selector ── */
.tier-bar{background:var(--dark3);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tier-label-txt{font-size:.72rem;color:var(--muted);margin-right:4px;white-space:nowrap}
.tier-btn{background:var(--dark2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tier-btn .tb-size{font-family:'Cinzel',serif;font-size:1rem;color:var(--text)}
.tier-btn .tb-name{font-size:.65rem;color:var(--muted)}
.tier-btn .tb-count{font-size:.6rem;background:rgba(201,168,76,.15);color:var(--gold);padding:1px 6px;border-radius:8px;margin-top:2px}
.tier-btn.active{border-color:var(--gold);background:rgba(201,168,76,.12)}
.tier-btn.active .tb-size,.tier-btn.active .tb-name{color:var(--gold-lt)}

/* ── Main layout ── */
.main{display:flex;height:calc(100vh - 108px);overflow:hidden}

/* ── Left: formation list ── */
.sidebar{width:240px;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-head h4{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold)}
.sidebar-head p{font-size:.68rem;color:var(--muted);margin-top:3px;line-height:1.4}
.formation-list{flex:1;overflow-y:auto;padding:8px}
.f-card{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.f-card:hover{border-color:var(--gold);background:rgba(201,168,76,.06)}
.f-card.active{border-color:var(--gold);background:rgba(201,168,76,.12)}
.f-name{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold-lt);margin-bottom:2px}
.f-sanskrit{font-size:.65rem;color:var(--muted);font-style:italic;margin-bottom:4px}
.f-meta{display:flex;gap:6px;flex-wrap:wrap}
.f-tag{font-size:.58rem;padding:1px 6px;border-radius:6px;font-weight:500}
.tag-diff-1{background:#14532d;color:#86efac}.tag-diff-2{background:#1e3a5f;color:#93c5fd}
.tag-diff-3{background:#3b2100;color:#fbbf24}.tag-diff-4{background:#450a0a;color:#fca5a5}
.tag-diff-5{background:#2e1065;color:#c4b5fd}
.tag-side-K{background:rgba(231,76,60,.15);color:#f87171}
.tag-side-P{background:rgba(52,152,219,.15);color:#93c5fd}

/* ── Centre: board ── */
.board-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;overflow:auto;background:var(--dark)}
.board-title-row{width:100%;max-width:800px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0}
.board-title-row h3{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold)}
.board-controls{display:flex;gap:6px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--gold);border-radius:6px;padding:4px 12px;font-family:'Outfit',sans-serif;font-size:.72rem;cursor:pointer;transition:all .2s}
.btn-sm:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}
.btn-sm.active{background:rgba(201,168,76,.2);border-color:var(--gold)}
.board-wrap{display:flex;align-items:flex-start;gap:4px;flex-shrink:0}
.rank-labels{display:flex;flex-direction:column;margin-right:2px}
.rank-labels span{display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--muted)}
.file-labels{display:flex;margin-left:0;margin-bottom:2px}
.file-labels span{text-align:center;font-size:.62rem;color:var(--muted)}
.board-grid{display:grid;border:2px solid rgba(201,168,76,.4);border-radius:2px;overflow:hidden;flex-shrink:0}
.sq{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .1s;font-size:1.1rem;user-select:none}
.sq.light{background:var(--sq-light)}.sq.dark{background:var(--sq-dark)}
.sq.p0{outline:2px solid rgba(231,76,60,.7);outline-offset:-2px}
.sq.p1{outline:2px solid rgba(52,152,219,.7);outline-offset:-2px}
.sq.highlight-role{background:rgba(201,168,76,.35)!important}
.sq .piece-sym{pointer-events:none;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.7);display:block}

/* ── Right: info panel ── */
.info-panel{width:260px;background:var(--dark2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;gap:0}
.info-section{padding:14px;border-bottom:1px solid var(--border)}
.info-section:last-child{border-bottom:none}
.info-title{font-family:'Cinzel',serif;font-size:.82rem;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.info-body{font-size:.75rem;color:#c4a97a;line-height:1.6}
.info-body strong{color:var(--text);display:block;margin-bottom:2px}
.counter-box{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:6px;padding:8px 10px;font-size:.72rem;color:#f87171;line-height:1.5}
.army-table{width:100%;border-collapse:collapse;font-size:.72rem}
.army-table td{padding:4px 6px;border-bottom:1px solid var(--border);color:#c4a97a}
.army-table td:first-child{color:var(--muted)}
.army-table tr:last-child td{border-bottom:none;font-weight:500;color:var(--text)}
.diff-stars{color:var(--gold);font-size:.8rem;letter-spacing:2px}
.role-legend{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.role-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--muted)}
.role-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hint-box{background:rgba(201,168,76,.08);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.7rem;color:#c4a97a;line-height:1.5;font-style:italic}
.show-both-btn{margin:10px 14px}

/* ── Empty state ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);text-align:center;padding:40px}
.empty-state i{font-size:2.5rem;color:rgba(201,168,76,.3)}
.empty-state p{font-size:.82rem;max-width:220px;line-height:1.5}

/* ── Piece colours per player ── */
.p0-piece{color:#e74c3c}.p1-piece{color:#3498db}

@media(max-width:900px){.main{flex-direction:column;height:auto}.sidebar,.info-panel{width:100%;max-height:40vh}.board-area{min-height:50vh}}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a href="game.html" class="logo"><i class="fa-solid fa-chess-king" style="color:var(--gold)"></i> चतुरंग</a>
  <span class="ver-badge">v1.0.5</span>
  <span class="phase-label">Vyuha Formation Builder</span>
  <div class="top-bar-right">
    <a href="army_builder.html" class="nav-icon-btn" title="Army Builder" style="text-decoration:none"><i class="fa-solid fa-shield-halved"></i></a>
    <a href="puzzles.html" class="nav-icon-btn" title="Puzzles" style="text-decoration:none"><i class="fa-solid fa-puzzle-piece"></i></a>
    <a href="game.html" class="nav-icon-btn" title="Play" style="text-decoration:none"><i class="fa-solid fa-chess-board"></i></a>
  </div>
</div>

<!-- Tier selector -->
<div class="tier-bar">
  <span class="tier-label-txt"><i class="fa-solid fa-layer-group"></i> Board Tier:</span>
  <button class="tier-btn active" data-size="12" onclick="selectTier(12,this)">
    <span class="tb-size">12×12</span>
    <span class="tb-name">Ashtavarga</span>
    <span class="tb-count">3 formations</span>
  </button>
  <button class="tier-btn" data-size="14" onclick="selectTier(14,this)">
    <span class="tb-size">14×14</span>
    <span class="tb-name">Chaturdasha</span>
    <span class="tb-count">4 formations</span>
  </button>
  <button class="tier-btn" data-size="16" onclick="selectTier(16,this)">
    <span class="tb-size">16×16</span>
    <span class="tb-name">Shodasha</span>
    <span class="tb-count">5 formations</span>
  </button>
  <button class="tier-btn" data-size="18" onclick="selectTier(18,this)">
    <span class="tb-size">18×18</span>
    <span class="tb-name">Ashtadasha</span>
    <span class="tb-count">5 formations</span>
  </button>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Left: formation list -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h4><i class="fa-solid fa-scroll"></i> Formations</h4>
      <p id="tierDesc">Select a tier above, then click a formation to study it.</p>
    </div>
    <div class="formation-list" id="formationList"></div>
  </aside>

  <!-- Centre: board -->
  <div class="board-area" id="boardArea">
    <div class="empty-state" id="emptyState">
      <i class="fa-solid fa-chess-board"></i>
      <p>Select a formation from the left panel to see it on the board</p>
    </div>
    <div id="activeBoard" style="display:none;width:100%;max-width:820px;display:flex;flex-direction:column;align-items:center">
      <div class="board-title-row">
        <h3 id="boardFormationTitle">—</h3>
        <div class="board-controls">
          <button class="btn-sm" id="btnP0" onclick="toggleSide(0)">Show Red</button>
          <button class="btn-sm" id="btnP1" onclick="toggleSide(1)">Show Blue</button>
          <button class="btn-sm active" id="btnBoth" onclick="showBoth()">Both Sides</button>
          <button class="btn-sm" id="btnRoles" onclick="toggleRoles()"><i class="fa-solid fa-tags"></i> Roles</button>
        </div>
      </div>
      <div class="file-labels" id="fileLabels"></div>
      <div class="board-wrap">
        <div class="rank-labels" id="rankLabels"></div>
        <div class="board-grid" id="boardGrid"></div>
      </div>
    </div>
  </div>

  <!-- Right: info -->
  <aside class="info-panel" id="infoPanel">
    <div class="empty-state">
      <i class="fa-solid fa-info-circle"></i>
      <p>Formation details will appear here</p>
    </div>
  </aside>

</div>

<script src="vyuha-data.js"></script>
<script>
const SYMBOLS = {pawn:'♟',horse:'♞',elephant:'♝',rook:'♜',king:'♚'};
const P_COLORS = ['#e74c3c','#3498db'];
const PIECE_VALS = {pawn:1,horse:3,elephant:3,rook:5,king:0};
const DIFF_LABELS = ['','Beginner','Novice','Intermediate','Advanced','Master'];

let currentSize = 12;
let currentFormation = null;
let showSide = 'both';   // 'both' | 0 | 1
let showRoles = false;

/* ── Tier selection ───────────────────────────────────────────────── */
function selectTier(size, btn) {
  currentSize = size;
  currentFormation = null;
  showSide = 'both';
  document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tier = ChaturangaVyuhaData.getTier(size);
  document.getElementById('tierDesc').textContent = tier ? tier.description : '';
  buildFormationList(size);
  clearBoard();
  clearInfo();
}

function buildFormationList(size) {
  const list = document.getElementById('formationList');
  list.innerHTML = '';
  const formations = ChaturangaVyuhaData.getForSize(size);
  formations.forEach(f => {
    const div = document.createElement('div');
    div.className = 'f-card';
    div.id = 'fcard-' + f.id;
    const stars = '★'.repeat(f.difficulty) + '☆'.repeat(5 - f.difficulty);
    div.innerHTML = `
      <div class="f-name">${f.name}</div>
      <div class="f-sanskrit">${f.sanskrit}</div>
      <div class="f-meta">
        <span class="f-tag tag-diff-${f.difficulty}">${DIFF_LABELS[f.difficulty]}</span>
        <span class="f-tag tag-side-${f.side[0]}">${f.side}</span>
        <span class="f-tag" style="background:rgba(201,168,76,.1);color:var(--muted)">Day ${f.day}</span>
      </div>`;
    div.onclick = () => selectFormation(f.id);
    list.appendChild(div);
  });
}

/* ── Formation selection ──────────────────────────────────────────── */
function selectFormation(id) {
  const f = ChaturangaVyuhaData.formations.find(x => x.id === id);
  if (!f) return;
  currentFormation = f;
  showSide = 'both';
  document.querySelectorAll('.f-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('fcard-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({block:'nearest'}); }
  renderBoard(f);
  renderInfo(f);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('activeBoard').style.display = 'flex';
  document.getElementById('boardFormationTitle').textContent = f.name + ' — ' + f.english;
  updateSideButtons();
}

/* ── Board rendering ──────────────────────────────────────────────── */
function renderBoard(f) {
  const S = f.size;
  const sqPx = Math.min(Math.floor(Math.min(window.innerWidth * 0.45, window.innerHeight * 0.65) / S), 44);
  const fileStr = 'abcdefghijklmnopqr'.substring(0, S);

  /* File labels */
  const flEl = document.getElementById('fileLabels');
  flEl.innerHTML = '';
  flEl.style.marginLeft = (20 + sqPx * 0 + 'px');
  const rlWidth = 20;
  flEl.style.paddingLeft = rlWidth + 'px';
  for (let fi = 0; fi < S; fi++) {
    const sp = document.createElement('span');
    sp.textContent = fileStr[fi];
    sp.style.width = sqPx + 'px';
    flEl.appendChild(sp);
  }

  /* Rank labels */
  const rlEl = document.getElementById('rankLabels');
  rlEl.innerHTML = '';
  for (let ri = S - 1; ri >= 0; ri--) {
    const sp = document.createElement('span');
    sp.textContent = ri + 1;
    sp.style.height = sqPx + 'px';
    sp.style.width = rlWidth + 'px';
    rlEl.appendChild(sp);
  }

  /* Board grid */
  const grid = document.getElementById('boardGrid');
  grid.style.gridTemplateColumns = `repeat(${S}, ${sqPx}px)`;
  grid.innerHTML = '';

  const pieces = f.getPieces();
  const p0map = new Map(), p1map = new Map();
  (pieces[0] || []).forEach(p => p0map.set(p.file + ',' + p.rank, p));
  (pieces[1] || []).forEach(p => p1map.set(p.file + ',' + p.rank, p));

  for (let ri = S - 1; ri >= 0; ri--) {
    for (let fi = 0; fi < S; fi++) {
      const key = fi + ',' + ri;
      const p0 = p0map.get(key);
      const p1 = p1map.get(key);
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((fi + ri) % 2 === 0 ? 'light' : 'dark');
      sq.style.width = sqPx + 'px';
      sq.style.height = sqPx + 'px';
      sq.style.fontSize = Math.floor(sqPx * 0.55) + 'px';

      let piece = null;
      if (showSide === 'both') {
        piece = p0 || p1;
        if (piece) sq.classList.add('p' + piece.player);
      } else {
        piece = showSide === 0 ? p0 : p1;
        if (piece) sq.classList.add('p' + showSide);
      }

      if (piece) {
        if (showRoles && piece.role) sq.classList.add('highlight-role');
        const span = document.createElement('span');
        span.className = 'piece-sym';
        span.style.color = P_COLORS[piece.player];
        span.style.fontSize = piece.type === 'king' ? Math.floor(sqPx * 0.62) + 'px' : Math.floor(sqPx * 0.52) + 'px';
        span.textContent = SYMBOLS[piece.type];
        span.title = piece.role || piece.type;
        sq.appendChild(span);
      }
      grid.appendChild(sq);
    }
  }
}

/* ── Info panel ───────────────────────────────────────────────────── */
function renderInfo(f) {
  const tier = ChaturangaVyuhaData.getTier(f.size);
  const army = tier ? tier.armyPerSide : {};
  const totalPts = (army.pawn||0) + (army.horse||0)*3 + (army.elephant||0)*3 + (army.rook||0)*5;
  const stars = '★'.repeat(f.difficulty) + '☆'.repeat(5 - f.difficulty);

  document.getElementById('infoPanel').innerHTML = `
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-scroll"></i> ${f.name}</div>
      <div class="info-body">
        <em style="color:var(--muted);font-size:.7rem">${f.sanskrit} · ${f.english}</em>
        <div style="margin:8px 0;display:flex;gap:6px;flex-wrap:wrap">
          <span class="f-tag tag-diff-${f.difficulty}" style="font-size:.65rem">${DIFF_LABELS[f.difficulty]}</span>
          <span class="f-tag tag-side-${f.side[0]}" style="font-size:.65rem">${f.side} · Day ${f.day}</span>
          <span class="f-tag" style="background:rgba(201,168,76,.1);color:var(--muted);font-size:.65rem">Commander: ${f.commander}</span>
        </div>
        <div class="diff-stars" style="margin-bottom:8px">${stars}</div>
        <strong>Objective</strong>
        ${f.objective}
      </div>
    </div>
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-book-open"></i> Description</div>
      <div class="info-body">${f.description}</div>
    </div>
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-landmark"></i> Historical context</div>
      <div class="info-body hint-box">${f.historicalNote}</div>
    </div>
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-shield-halved"></i> Counter formation</div>
      <div class="counter-box"><i class="fa-solid fa-xmark" style="margin-right:4px"></i>${f.counter}</div>
    </div>
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-chess-rook"></i> Army for this board</div>
      <table class="army-table">
        <tr><td>Nara (pawn) ×${army.pawn}</td><td style="text-align:right">${army.pawn} pts</td></tr>
        <tr><td>Ashwa (horse) ×${army.horse}</td><td style="text-align:right">${army.horse*3} pts</td></tr>
        <tr><td>Danti (elephant) ×${army.elephant}</td><td style="text-align:right">${army.elephant*3} pts</td></tr>
        <tr><td>Ratha (rook) ×${army.rook}</td><td style="text-align:right">${army.rook*5} pts</td></tr>
        <tr><td>Raja (king) ×1</td><td style="text-align:right">—</td></tr>
        <tr><td><strong>Total budget (2P)</strong></td><td style="text-align:right"><strong>${tier ? tier.budget2p : '?'} pts</strong></td></tr>
      </table>
    </div>
    <div class="info-section">
      <div class="info-title"><i class="fa-solid fa-circle-info"></i> Piece colours</div>
      <div class="role-legend">
        <div class="role-item"><div class="role-dot" style="background:#e74c3c"></div><span>Red outline = Player 1 (bottom)</span></div>
        <div class="role-item"><div class="role-dot" style="background:#3498db"></div><span>Blue outline = Player 2 (top)</span></div>
        <div class="role-item"><div class="role-dot" style="background:rgba(201,168,76,.5)"></div><span>Gold highlight = piece role (toggle Roles)</span></div>
      </div>
    </div>`;
}

/* ── Side toggle ──────────────────────────────────────────────────── */
function toggleSide(side) {
  showSide = side;
  updateSideButtons();
  if (currentFormation) renderBoard(currentFormation);
}
function showBoth() {
  showSide = 'both';
  updateSideButtons();
  if (currentFormation) renderBoard(currentFormation);
}
function updateSideButtons() {
  document.getElementById('btnP0').classList.toggle('active', showSide === 0);
  document.getElementById('btnP1').classList.toggle('active', showSide === 1);
  document.getElementById('btnBoth').classList.toggle('active', showSide === 'both');
}
function toggleRoles() {
  showRoles = !showRoles;
  document.getElementById('btnRoles').classList.toggle('active', showRoles);
  if (currentFormation) renderBoard(currentFormation);
}

/* ── Clear helpers ────────────────────────────────────────────────── */
function clearBoard() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('activeBoard').style.display = 'none';
  document.getElementById('boardGrid').innerHTML = '';
  document.getElementById('fileLabels').innerHTML = '';
  document.getElementById('rankLabels').innerHTML = '';
}
function clearInfo() {
  document.getElementById('infoPanel').innerHTML = `
    <div class="empty-state">
      <i class="fa-solid fa-info-circle"></i>
      <p>Formation details will appear here</p>
    </div>`;
}

/* ── Init ─────────────────────────────────────────────────────────── */
buildFormationList(12);
document.getElementById('tierDesc').textContent = ChaturangaVyuhaData.getTier(12).description;

/* Re-render on resize */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (currentFormation) renderBoard(currentFormation); }, 150);
});
</script>
