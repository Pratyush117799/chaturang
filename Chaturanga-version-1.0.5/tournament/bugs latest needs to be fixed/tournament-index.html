<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chaturanga — Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root{--gold:#c9a84c;--gold2:#e8c96a;--dark:#0f0c07;--dark2:#1a1306;--dark3:#231a08;--border:rgba(201,168,76,.2);--text:#f5ead0;--muted:#7a6644;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--amber:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

.top-nav{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);font-weight:700}
.nav-ver{font-size:.68rem;background:rgba(201,168,76,.12);color:var(--muted);padding:2px 8px;border-radius:10px}
.nav-links{display:flex;gap:2px;margin-left:auto}
.nav-link{padding:6px 12px;border-radius:6px;font-size:.82rem;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-link:hover{background:rgba(201,168,76,.1);color:var(--gold)}

.tab-bar{background:var(--dark3);border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 20px;flex-shrink:0;overflow-x:auto}
.tab-btn{padding:12px 20px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.85rem;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.page{flex:1;display:flex;gap:0;overflow:hidden;min-height:0}
.main-col{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.right-col{width:230px;background:var(--dark2);border-left:1px solid var(--border);padding:16px;overflow-y:auto;flex-shrink:0}

.section-label{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);margin-bottom:4px}
.card-sub{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:14px}

.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.85rem;outline:none;min-width:120px}
.field input:focus,.field select:focus{border-color:var(--gold)}

.btn{padding:8px 18px;border-radius:6px;border:none;font-family:'Outfit',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,#c8960c,#7a5c08);color:#1a0e00;font-weight:600}
.btn-gold:hover{background:linear-gradient(135deg,#e8b52a,#c8960c)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.08)}
.btn-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-red:hover{background:rgba(248,113,113,.25)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.player-chip{display:inline-flex;align-items:center;gap:6px;background:var(--dark3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:.78rem;margin:3px}
.player-chip.bot{border-color:rgba(96,165,250,.3);color:var(--blue)}
.player-chip.human{border-color:rgba(74,222,128,.3);color:var(--green)}
.player-chip .rm{cursor:pointer;color:var(--muted);transition:color .2s}
.player-chip .rm:hover{color:var(--red)}

.timer-big{font-family:'Cinzel',serif;font-size:2.5rem;color:var(--gold);text-align:center;padding:12px;letter-spacing:.1em}
.timer-big.warning{color:var(--red)}

.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;background:rgba(255,255,255,.02);transition:background .2s}
.lb-row:hover{background:rgba(201,168,76,.06)}
.lb-rank{font-family:'Cinzel',serif;font-size:.9rem;color:var(--muted);width:24px;text-align:center;flex-shrink:0}
.lb-rank.r1{color:#ffd700}.lb-rank.r2{color:#c0c0c0}.lb-rank.r3{color:#cd7f32}
.lb-name{flex:1;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-name.bot{color:var(--blue)}.lb-name.human{color:var(--green)}
.lb-score{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold);min-width:36px;text-align:right}
.lb-detail{font-size:.68rem;color:var(--muted);min-width:50px;text-align:right}

.streak-badge{font-size:.65rem;background:rgba(251,191,36,.2);color:var(--amber);border-radius:4px;padding:1px 5px;margin-left:4px}

.result-feed{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.result-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.02);font-size:.78rem;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.result-item .rw{color:var(--green)}.result-item .rd{color:var(--amber)}.result-item .rl{color:var(--red)}
.result-win{border-left:2px solid var(--green)}.result-draw{border-left:2px solid var(--amber)}

.pairings-table{width:100%;border-collapse:collapse;font-size:.82rem}
.pairings-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
.pairings-table td{padding:8px 10px;border-bottom:1px solid rgba(201,168,76,.07)}
.pairings-table tr:hover td{background:rgba(201,168,76,.04)}
.badge-result{padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
.badge-w{background:rgba(74,222,128,.15);color:var(--green)}
.badge-d{background:rgba(251,191,36,.15);color:var(--amber)}
.badge-l{background:rgba(248,113,113,.15);color:var(--red)}
.badge-pending{background:rgba(255,255,255,.06);color:var(--muted)}

.rr-matrix{width:100%;border-collapse:collapse;font-size:.75rem;margin-top:10px}
.rr-matrix th,.rr-matrix td{padding:6px 8px;border:1px solid var(--border);text-align:center}
.rr-matrix th{background:var(--dark3);color:var(--gold);font-weight:500}
.rr-matrix .diag{background:rgba(255,255,255,.04)}
.rr-matrix .win{color:var(--green)}.rr-matrix .loss{color:var(--red)}.rr-matrix .draw{color:var(--amber)}

.round-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.round-pill{padding:4px 12px;border-radius:20px;font-size:.75rem;border:1px solid var(--border);color:var(--muted)}
.round-pill.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.round-pill.done{border-color:rgba(74,222,128,.3);color:var(--green);background:rgba(74,222,128,.06)}

.bot-champ-arena{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:14px}
.bot-vs{display:flex;align-items:center;justify-content:center;gap:20px;margin:12px 0}
.bot-card-sm{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:110px}
.bot-card-sm .bname{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold)}
.bot-card-sm .belo{font-size:.7rem;color:var(--muted)}
.vs-dot{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--muted)}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.standings-bar{height:4px;background:rgba(201,168,76,.15);border-radius:2px;margin-top:4px}
.standings-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .5s ease}

.history-item{padding:8px 0;border-bottom:1px solid rgba(201,168,76,.07);font-size:.75rem}
.history-item:last-child{border:none}
.history-format{font-size:.68rem;color:var(--muted);margin-bottom:2px}
.history-winner{color:var(--gold)}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state i{font-size:2.5rem;color:rgba(201,168,76,.3);display:block;margin-bottom:12px}

@media(max-width:700px){.right-col{display:none}.page{flex-direction:column}}
</style>
</head>
<body>

<div class="top-nav">
  <a href="../game.html" class="nav-logo">चतुरंग</a>
  <span class="nav-ver">Tournament v1.0.5</span>
  <div class="nav-links">
    <a href="../game.html"    class="nav-link"><i class="fa-solid fa-chess-board fa-sm"></i> Game</a>
    <a href="../puzzles.html" class="nav-link"><i class="fa-solid fa-puzzle-piece fa-sm"></i> Puzzles</a>
    <a href="../lessons.html" class="nav-link"><i class="fa-solid fa-graduation-cap fa-sm"></i> Lessons</a>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('arena')">
    <i class="fa-solid fa-stopwatch fa-sm"></i> Arena
  </button>
  <button class="tab-btn" onclick="switchTab('swiss')">
    <i class="fa-solid fa-layer-group fa-sm"></i> Swiss
  </button>
  <button class="tab-btn" onclick="switchTab('rr')">
    <i class="fa-solid fa-table fa-sm"></i> Round Robin
  </button>
  <button class="tab-btn" onclick="switchTab('botchamp')">
    <i class="fa-solid fa-robot fa-sm"></i> Bot Championship
  </button>
</div>

<div class="page">
  <div class="main-col" id="mainCol">
    <!-- content injected by JS -->
  </div>
  <div class="right-col">
    <div class="section-label"><i class="fa-solid fa-trophy fa-xs"></i> ELO Leaderboard</div>
    <div id="globalLb"></div>
    <div style="margin-top:18px">
      <div class="section-label"><i class="fa-solid fa-clock-rotate-left fa-xs"></i> History</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script src="tournament-engine.js"></script>
<script>
// ── State ───────────────────────────────────────────────────────────────────
let currentTab = 'arena';
let arenaSetup  = { players:[], duration:10 };
let swissSetup  = { players:[], rounds:5 };
let rrSetup     = { players:[] };
let activeTournament = null;

const T = () => window.ChaturangaTournament;
const $  = id => document.getElementById(id);

// ── Tab router ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['arena','swiss','rr','botchamp'][i] === tab);
  });
  renderMain();
}

// ── Shared player builder ────────────────────────────────────────────────────
function renderPlayerBuilder(setup, key) {
  const hasBotSel = key !== 'botchamp';
  return `
  <div class="card-title">Players</div>
  <div class="card-sub">Add humans or bots to compete. Minimum 2 players required.</div>
  <div class="form-row">
    <div class="field">
      <label>Human name</label>
      <input type="text" id="humanName_${key}" placeholder="Player name" maxlength="18"/>
    </div>
    <div class="field">
      <label>ELO rating</label>
      <input type="number" id="humanElo_${key}" placeholder="1200" min="400" max="2200" value="1200" style="width:90px"/>
    </div>
    <button class="btn btn-outline" onclick="addHuman('${key}')">
      <i class="fa-solid fa-user-plus fa-xs"></i> Add Human
    </button>
    ${hasBotSel?`
    <div class="field">
      <label>Bot</label>
      <select id="botElo_${key}">
        ${T().BOT_ELOS.map(e=>`<option value="${e}">ELO ${e} — ${T().BOT_NAMES[e]}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-outline" onclick="addBot('${key}')">
      <i class="fa-solid fa-robot fa-xs"></i> Add Bot
    </button>`:''}
  </div>
  <div id="playerList_${key}" style="margin-top:4px">${renderChips(setup.players, key)}</div>`;
}

function renderChips(players, key) {
  if (!players.length) return '<span style="font-size:.78rem;color:var(--muted)">No players yet</span>';
  return players.map((p,i) =>
    `<span class="player-chip ${p.isBot?'bot':'human'}">
       <i class="fa-solid ${p.isBot?'fa-robot':'fa-user'} fa-xs"></i>
       ${p.name}${p.isBot?` <span style="font-size:.65rem;opacity:.7">${p.elo}</span>`:''}
       <span class="rm" onclick="removePlayer('${key}',${i})">×</span>
     </span>`
  ).join('');
}

function addHuman(key) {
  const nameEl = $(`humanName_${key}`);
  const eloEl  = $(`humanElo_${key}`);
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const elo = parseInt(eloEl.value)||1200;
  getSetup(key).players.push(T().makeHumanPlayer(name, elo));
  nameEl.value='';
  updatePlayerList(key);
}

function addBot(key) {
  const elo = parseInt($(`botElo_${key}`).value);
  const setup = getSetup(key);
  if (setup.players.find(p=>p.isBot && p.elo===elo)) {
    alert(`${T().BOT_NAMES[elo]} is already in the tournament.`); return;
  }
  setup.players.push(T().makeBotPlayer(elo));
  updatePlayerList(key);
}

function removePlayer(key, idx) {
  getSetup(key).players.splice(idx,1);
  updatePlayerList(key);
}

function updatePlayerList(key) {
  const el = $(`playerList_${key}`);
  if (el) el.innerHTML = renderChips(getSetup(key).players, key);
  const startBtn = $(`startBtn_${key}`);
  if (startBtn) startBtn.disabled = getSetup(key).players.length < 2;
}

function getSetup(key) {
  return key==='arena' ? arenaSetup : key==='swiss' ? swissSetup : rrSetup;
}

// ── ARENA ─────────────────────────────────────────────────────────────────────
function renderArenaSetup() {
  return `
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-stopwatch" style="color:var(--gold);margin-right:8px"></i>Arena Tournament</div>
    <div class="card-sub">Time-based continuous play. Win streaks earn double points. Join or leave any time while the clock runs.</div>
    ${renderPlayerBuilder(arenaSetup,'arena')}
    <div class="form-row" style="margin-top:12px">
      <div class="field">
        <label>Duration</label>
        <select id="arenaDuration" onchange="arenaSetup.duration=parseInt(this.value)">
          <option value="3">3 minutes</option>
          <option value="5">5 minutes</option>
          <option value="10" selected>10 minutes</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
        </select>
      </div>
      <button class="btn btn-gold" id="startBtn_arena" onclick="startArena()" ${arenaSetup.players.length<2?'disabled':''}>
        <i class="fa-solid fa-play fa-xs"></i> Start Arena
      </button>
    </div>
    <div style="font-size:.75rem;color:var(--muted);margin-top:8px;line-height:1.6">
      <i class="fa-solid fa-fire-flame-curved fa-xs" style="color:var(--amber)"></i>
      Win 2 in a row → next win earns <strong style="color:var(--amber)">4 pts</strong> instead of 2.
      Draws = 1 pt each. Games auto-pair as soon as both players are free.
    </div>
  </div>`;
}

function startArena() {
  if (arenaSetup.players.length < 2) return;
  activeTournament = { type:'arena', engine: new T().ArenaEngine({
    duration: arenaSetup.duration, players: arenaSetup.players
  })};
  const eng = activeTournament.engine;
  eng.onGameDone = (game, pA, pB) => { renderArenaActive(); };
  eng.onTick     = () => { renderArenaTimer(); };
  eng.start();
  renderMain();
}

function renderArenaActive() {
  const eng = activeTournament.engine;
  const lb  = eng.getLeaderboard();
  const rec = eng.recentGames();
  const active = eng.games.filter(g=>!g.result);
  const maxScore = lb[0]?.score || 1;

  $('mainCol').innerHTML = `
  <div style="display:flex;gap:12px;align-items:center">
    <div class="timer-big ${eng.timeRemaining()<60?'warning':''}" id="arenaTimer">${fmtTime(eng.timeRemaining())}</div>
    <div>
      <div style="font-size:.78rem;color:var(--muted)">Arena in progress</div>
      <div style="font-size:.82rem">${lb.length} players · ${eng.games.filter(g=>g.result).length} games played</div>
    </div>
    <button class="btn btn-red" style="margin-left:auto" onclick="stopArena()">
      <i class="fa-solid fa-stop fa-xs"></i> End Arena
    </button>
  </div>

  <div class="card">
    <div class="section-label"><i class="fa-solid fa-bolt fa-xs"></i> Live Pairings</div>
    ${active.length ? active.map(g=>{
      const nA=eng.players.find(p=>p.id===g.pA)?.name||'?';
      const nB=eng.players.find(p=>p.id===g.pB)?.name||'?';
      return `<div class="lb-row"><span class="live-dot"></span>${nA} <span style="color:var(--muted);margin:0 6px">vs</span> ${nB}</div>`;
    }).join('') : '<div style="font-size:.78rem;color:var(--muted)">Pairing in progress...</div>'}
  </div>

  <div class="card">
    <div class="section-label"><i class="fa-solid fa-ranking-star fa-xs"></i> Leaderboard</div>
    ${lb.map((p,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
      <div style="flex:1">
        <div class="lb-name ${p.isBot?'bot':'human'}">
          ${p.name}${p.streak>=2?`<span class="streak-badge"><i class="fa-solid fa-fire fa-xs"></i> ${p.streak}</span>`:''}
        </div>
        <div class="standings-bar"><div class="standings-fill" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
      </div>
      <span class="lb-score">${p.score}</span>
      <span class="lb-detail">${p.wins}W ${p.draws}D</span>
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="section-label"><i class="fa-solid fa-list fa-xs"></i> Recent Results</div>
    <div class="result-feed">
    ${rec.map(g=>{
      const nA=eng.players.find(p=>p.id===g.pA)?.name||'?';
      const nB=eng.players.find(p=>p.id===g.pB)?.name||'?';
      const res=g.result==='A'?`<span class="rw">${nA} wins</span>`:g.result==='B'?`<span class="rw">${nB} wins</span>`:`<span class="rd">Draw</span>`;
      return `<div class="result-item ${g.result==='D'?'result-draw':'result-win'}">${nA} vs ${nB} — ${res}</div>`;
    }).join('')}
    </div>
  </div>`;
}

function renderArenaTimer() {
  const el = $('arenaTimer');
  if (!el || !activeTournament) return;
  const rem = activeTournament.engine.timeRemaining();
  el.textContent = fmtTime(rem);
  el.className = `timer-big ${rem<60?'warning':''}`;
  if (rem===0) { $('mainCol').innerHTML += `<div class="card" style="text-align:center;padding:24px"><div class="card-title">Arena Over!</div>${renderFinalStandings(activeTournament.engine.getLeaderboard())}</div>`; }
}

function stopArena() {
  if (activeTournament?.engine) { activeTournament.engine.stop(); activeTournament=null; }
  arenaSetup.players=[]; renderMain();
}

// ── SWISS ──────────────────────────────────────────────────────────────────────
function renderSwissSetup() {
  return `
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-layer-group" style="color:var(--gold);margin-right:8px"></i>Swiss Tournament</div>
    <div class="card-sub">Fixed rounds. Players with equal scores are paired. Buchholz tiebreaks. All players play every round.</div>
    ${renderPlayerBuilder(swissSetup,'swiss')}
    <div class="form-row" style="margin-top:12px">
      <div class="field">
        <label>Rounds</label>
        <select id="swissRounds" onchange="swissSetup.rounds=parseInt(this.value)">
          <option value="3">3 rounds</option>
          <option value="5" selected>5 rounds</option>
          <option value="7">7 rounds</option>
          <option value="9">9 rounds</option>
        </select>
      </div>
      <button class="btn btn-gold" id="startBtn_swiss" onclick="startSwiss()" ${swissSetup.players.length<2?'disabled':''}>
        <i class="fa-solid fa-play fa-xs"></i> Start Swiss
      </button>
    </div>
  </div>`;
}

function startSwiss() {
  if (swissSetup.players.length < 2) return;
  activeTournament = { type:'swiss', engine: new T().SwissEngine({
    rounds: swissSetup.rounds, players: swissSetup.players
  }), currentRound: 0 };
  activeTournament.engine.startNextRound();
  activeTournament.currentRound = 1;
  renderMain();
}

function renderSwissActive() {
  const eng  = activeTournament.engine;
  const cur  = eng.rounds[eng.current-1];
  const standings = eng.getStandings();
  const maxScore  = standings[0]?.score || 1;

  return `
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div>
        <div class="card-title">Swiss Tournament — Round ${eng.current}/${eng.totalRounds}</div>
        <div style="font-size:.78rem;color:var(--muted)">${standings.length} players · Buchholz tiebreaks</div>
      </div>
      <button class="btn btn-red" style="margin-left:auto" onclick="stopTournament()">
        <i class="fa-solid fa-xmark fa-xs"></i> Abandon
      </button>
    </div>
    <div class="round-pills">
      ${Array.from({length:eng.totalRounds},(_,i)=>`
      <span class="round-pill ${i<eng.current-1?'done':i===eng.current-1?'active':''}">
        R${i+1}${i<eng.current-1?' ✓':''}
      </span>`).join('')}
    </div>

    <div class="section-label"><i class="fa-solid fa-chess-board fa-xs"></i> Round ${eng.current} Pairings</div>
    <table class="pairings-table">
      <thead><tr><th>#</th><th>White</th><th>Black</th><th>Result</th><th></th></tr></thead>
      <tbody>
      ${(cur?.pairings||[]).map((p,i)=>{
        const res = p.result;
        const badge = !res ? '<span class="badge-result badge-pending">Pending</span>'
          : res==='bye' ? '<span class="badge-result badge-d">Bye</span>'
          : res==='W' ? `<span class="badge-result badge-w">${p.white.name} wins</span>`
          : res==='D' ? '<span class="badge-result badge-d">Draw</span>'
          : `<span class="badge-result badge-l">${p.black?.name||'?'} wins</span>`;
        const white = `<span class="${p.white.isBot?'':''}">` + p.white.name + `</span>`;
        const black = p.black ? p.black.name : '—';
        return `<tr><td style="color:var(--muted)">${i+1}</td><td>${white}</td><td>${black}</td><td>${badge}</td>
          <td>${!res&&p.black?`<button class="btn btn-outline" style="padding:3px 10px;font-size:.72rem" onclick="simSwissGame(${eng.current-1},${i})">Simulate</button>`:''}</td></tr>`;
      }).join('')}
      </tbody>
    </table>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-outline" onclick="simSwissRound()">Simulate Remaining</button>
      ${eng._roundComplete() && !eng.isFinished ? `<button class="btn btn-gold" onclick="nextSwissRound()"><i class="fa-solid fa-arrow-right fa-xs"></i> Next Round</button>` : ''}
      ${eng.isFinished ? `<button class="btn btn-gold" onclick="finishSwiss()"><i class="fa-solid fa-flag-checkered fa-xs"></i> View Results</button>` : ''}
    </div>
  </div>

  <div class="card">
    <div class="section-label"><i class="fa-solid fa-ranking-star fa-xs"></i> Standings</div>
    ${standings.map((p,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
      <div style="flex:1">
        <div class="lb-name ${p.isBot?'bot':'human'}">${p.name}</div>
        <div class="standings-bar"><div class="standings-fill" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
      </div>
      <span class="lb-score">${p.score}</span>
      <span class="lb-detail">BH: ${p.buchholz.toFixed(1)}</span>
    </div>`).join('')}
  </div>`;
}

function simSwissGame(roundIdx, pairIdx) {
  const eng = activeTournament.engine;
  const p = eng.rounds[roundIdx].pairings[pairIdx];
  if (!p || !p.black) return;
  const r = T().simulateGame(p.white, p.black);
  eng.submitResult(roundIdx, pairIdx, r==='A'?'W':r==='D'?'D':'L');
  renderMain();
}

function simSwissRound() {
  const eng = activeTournament.engine;
  eng.simulateRound(eng.current-1);
  renderMain();
}

function nextSwissRound() {
  activeTournament.engine.startNextRound();
  renderMain();
}

function finishSwiss() {
  const standings = activeTournament.engine.getStandings();
  T().Leaderboard.recordTournament('Swiss', standings);
  renderGlobalLeaderboard();
  renderMain();
}

// ── ROUND ROBIN ────────────────────────────────────────────────────────────────
function renderRRSetup() {
  return `
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-table" style="color:var(--gold);margin-right:8px"></i>Round Robin</div>
    <div class="card-sub">Everyone plays everyone. Full cross-table. Win=1 pt, Draw=½ pt. Best for small groups (2–8 players).</div>
    ${renderPlayerBuilder(rrSetup,'rr')}
    <div class="form-row" style="margin-top:12px">
      <button class="btn btn-gold" id="startBtn_rr" onclick="startRR()" ${rrSetup.players.length<2?'disabled':''}>
        <i class="fa-solid fa-play fa-xs"></i> Start Round Robin
      </button>
    </div>
  </div>`;
}

function startRR() {
  if (rrSetup.players.length < 2) return;
  activeTournament = { type:'rr', engine: new T().RoundRobinEngine({ players: rrSetup.players }) };
  const eng = activeTournament.engine;
  eng.simulateAll(game => { renderMain(); });
  renderMain();
}

function renderRRActive() {
  const eng = activeTournament.engine;
  const standings = eng.getStandings();
  const matrix    = eng.getMatrix();
  const players   = eng.players;
  const maxScore  = standings[0]?.score || 1;
  const total     = eng.games.length;
  const done      = eng.games.filter(g=>g.result).length;

  return `
  <div class="card">
    <div class="card-title">Round Robin — ${done}/${total} games complete</div>
    <div style="background:rgba(201,168,76,.07);border-radius:6px;height:6px;margin:10px 0">
      <div style="background:var(--gold);height:100%;border-radius:6px;width:${Math.round(done/total*100)}%;transition:width .4s"></div>
    </div>

    <div class="section-label" style="margin-top:14px"><i class="fa-solid fa-grid fa-xs"></i> Cross Table</div>
    <div style="overflow-x:auto">
    <table class="rr-matrix">
      <thead><tr><th>Player</th>${players.map((_,i)=>`<th>${i+1}</th>`).join('')}<th>Score</th></tr></thead>
      <tbody>
      ${players.map((p,i)=>`<tr>
        <td style="text-align:left;color:${p.isBot?'var(--blue)':'var(--green)'}">${i+1}. ${p.name}</td>
        ${players.map((q,j)=>{
          if (i===j) return `<td class="diag">—</td>`;
          const v = matrix[p.id]?.[q.id];
          const cls = v===1?'win':v===0?'loss':v==='½'?'draw':'';
          return `<td class="${cls}">${v===undefined||v===undefined?'–':v}</td>`;
        }).join('')}
        <td style="font-weight:500;color:var(--gold)">${p.score}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>

  <div class="card">
    <div class="section-label"><i class="fa-solid fa-ranking-star fa-xs"></i> Final Standings</div>
    ${standings.map((p,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
      <div style="flex:1">
        <div class="lb-name ${p.isBot?'bot':'human'}">${p.name}</div>
        <div class="standings-bar"><div class="standings-fill" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
      </div>
      <span class="lb-score">${p.score}</span>
      <span class="lb-detail">${p.wins}W ${p.draws}D ${p.losses}L</span>
    </div>`).join('')}
  </div>`;
}

// ── BOT CHAMPIONSHIP ───────────────────────────────────────────────────────────
let botChamp = null;
let champGameIdx = 0;
let champLog = [];

function renderBotChampSetup() {
  return `
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-robot" style="color:var(--gold);margin-right:8px"></i>Bot Championship</div>
    <div class="card-sub">All 10 bots compete in a full Round Robin. 45 games total. Watch the results live as each bot's strength is revealed.</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:14px 0">
      ${T().BOT_ELOS.map(e=>`
      <div style="background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.78rem">
        <div style="color:var(--gold);font-family:'Cinzel',serif">ELO ${e}</div>
        <div style="color:var(--muted);font-size:.7rem">${T().BOT_NAMES[e]}</div>
      </div>`).join('')}
    </div>
    <button class="btn btn-gold" onclick="startBotChamp()">
      <i class="fa-solid fa-play fa-xs"></i> Start Bot Championship
    </button>
  </div>`;
}

function startBotChamp() {
  const players = T().BOT_ELOS.map(e => T().makeBotPlayer(e));
  botChamp = new T().RoundRobinEngine({ players });
  champGameIdx = 0;
  champLog = [];
  renderMain();
  playNextChampGame();
}

function playNextChampGame() {
  if (!botChamp) return;
  const game = botChamp.games[champGameIdx];
  if (!game) {
    T().Leaderboard.recordTournament('Bot Championship', botChamp.getStandings());
    renderGlobalLeaderboard();
    renderMain();
    return;
  }
  const r = T().simulateGame(game.pA, game.pB);
  game.result = r;
  if (r==='A') { game.pA.score+=1; game.pA.wins++; game.pB.losses++; }
  else if (r==='D') { game.pA.score+=.5; game.pA.draws++; game.pB.score+=.5; game.pB.draws++; }
  else { game.pB.score+=1; game.pB.wins++; game.pA.losses++; }
  const winner = r==='A'?game.pA.name:r==='B'?game.pB.name:'Draw';
  champLog.unshift({ a:game.pA.name, b:game.pB.name, result:r, winner });
  champGameIdx++;
  renderMain();
  if (champGameIdx < botChamp.games.length) {
    setTimeout(playNextChampGame, 400 + Math.random()*300);
  } else {
    botChamp.done = true;
    T().Leaderboard.recordTournament('Bot Championship', botChamp.getStandings());
    renderGlobalLeaderboard();
    renderMain();
  }
}

function renderBotChampActive() {
  if (!botChamp) return renderBotChampSetup();
  const game = botChamp.games[champGameIdx];
  const standings = botChamp.getStandings();
  const maxScore  = standings[0]?.score || 1;
  const total = botChamp.games.length;
  const done  = champGameIdx;
  const finished = botChamp.done;

  return `
  <div class="bot-champ-arena">
    ${!finished && game ? `
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">
      <span class="live-dot"></span> Game ${done+1} of ${total}
    </div>
    <div class="bot-vs">
      <div class="bot-card-sm">
        <div class="bname">${game.pA.name}</div>
        <div class="belo">ELO ${game.pA.elo}</div>
      </div>
      <span class="vs-dot">VS</span>
      <div class="bot-card-sm">
        <div class="bname">${game.pB.name}</div>
        <div class="belo">ELO ${game.pB.elo}</div>
      </div>
    </div>` : `
    <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin-bottom:8px">
      <i class="fa-solid fa-flag-checkered"></i> Championship Complete!
    </div>
    <div style="font-size:.85rem">Winner: <strong style="color:var(--gold2)">${standings[0]?.name}</strong></div>`}
    <div style="background:rgba(201,168,76,.07);border-radius:4px;height:4px;margin:12px 0">
      <div style="background:var(--gold);height:100%;border-radius:4px;width:${Math.round(done/total*100)}%;transition:width .3s"></div>
    </div>
    <div style="font-size:.72rem;color:var(--muted)">${done}/${total} games · ${Math.round(done/total*100)}% complete</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <div class="section-label"><i class="fa-solid fa-ranking-star fa-xs"></i> Live Standings</div>
      ${standings.map((p,i)=>`
      <div class="lb-row">
        <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
        <div style="flex:1">
          <div style="font-size:.82rem;color:var(--blue)">${p.name}</div>
          <div class="standings-bar"><div class="standings-fill" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
        </div>
        <span class="lb-score">${p.score}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="section-label"><i class="fa-solid fa-list fa-xs"></i> Recent Results</div>
      <div class="result-feed">
        ${champLog.slice(0,12).map(g=>{
          const res = g.result==='D'
            ? `<span class="rd">Draw</span>`
            : `<span class="rw">${g.winner} wins</span>`;
          return `<div class="result-item ${g.result==='D'?'result-draw':'result-win'}" style="font-size:.75rem">
            ${g.a} vs ${g.b} — ${res}</div>`;
        }).join('')}
      </div>
    </div>
  </div>

  ${finished ? `<div class="card" style="text-align:center;padding:24px">
    <div class="card-title" style="margin-bottom:8px">Final Results</div>
    ${renderFinalStandings(standings)}
    <button class="btn btn-outline" style="margin-top:16px" onclick="botChamp=null;champLog=[];renderMain()">
      Run Again
    </button>
  </div>` : ''}`;
}

// ── Shared finals renderer ─────────────────────────────────────────────────────
function renderFinalStandings(standings) {
  const medals = ['🥇','🥈','🥉'];
  return `<div style="display:flex;flex-direction:column;gap:8px;max-width:400px;margin:0 auto">
    ${standings.slice(0,10).map((p,i)=>`
    <div class="lb-row">
      <span style="font-size:1.2rem;width:28px;text-align:center">${medals[i]||i+1}</span>
      <span class="lb-name ${p.isBot?'bot':'human'}" style="flex:1">${p.name}</span>
      <span class="lb-score">${p.score} pts</span>
      <span class="lb-detail">${p.wins}W ${p.draws}D ${p.losses}L</span>
    </div>`).join('')}
  </div>`;
}

// ── Main render ────────────────────────────────────────────────────────────────
function renderMain() {
  const mc = $('mainCol');
  if (!mc) return;

  if (currentTab === 'arena') {
    if (activeTournament?.type==='arena' && activeTournament.engine.active) {
      renderArenaActive();
    } else if (activeTournament?.type==='arena' && !activeTournament.engine.active) {
      mc.innerHTML = `<div class="card" style="text-align:center;padding:24px">
        <div class="card-title">Arena Ended</div>
        ${renderFinalStandings(activeTournament.engine.getLeaderboard())}
        <button class="btn btn-outline" style="margin-top:16px" onclick="activeTournament=null;arenaSetup.players=[];renderMain()">New Tournament</button>
      </div>`;
    } else {
      mc.innerHTML = renderArenaSetup();
    }
  } else if (currentTab === 'swiss') {
    if (activeTournament?.type==='swiss') {
      const eng = activeTournament.engine;
      if (eng.isFinished) {
        mc.innerHTML = `<div class="card" style="text-align:center;padding:24px">
          <div class="card-title">Swiss Tournament Complete</div>
          ${renderFinalStandings(eng.getStandings())}
          <button class="btn btn-outline" style="margin-top:16px" onclick="activeTournament=null;swissSetup.players=[];renderMain()">New Tournament</button>
        </div>`;
      } else {
        mc.innerHTML = renderSwissActive();
      }
    } else {
      mc.innerHTML = renderSwissSetup();
    }
  } else if (currentTab === 'rr') {
    if (activeTournament?.type==='rr') {
      mc.innerHTML = renderRRActive();
      if (activeTournament.engine.done) {
        mc.innerHTML += `<button class="btn btn-outline" style="margin-top:8px" onclick="activeTournament=null;rrSetup.players=[];renderMain()">New Tournament</button>`;
      }
    } else {
      mc.innerHTML = renderRRSetup();
    }
  } else if (currentTab === 'botchamp') {
    mc.innerHTML = botChamp ? renderBotChampActive() : renderBotChampSetup();
  }
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function fmtTime(s) {
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function stopTournament() {
  activeTournament = null;
  renderMain();
}

function renderGlobalLeaderboard() {
  const top = T()?.Leaderboard?.getTopPlayers() || [];
  const hist = T()?.Leaderboard?.getHistory() || [];
  const lb = $('globalLb');
  const hl = $('historyList');

  if (lb) lb.innerHTML = top.length ? top.slice(0,8).map((p,i)=>`
    <div class="lb-row">
      <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
      <span class="lb-name human">${p.name}</span>
      <span style="font-size:.68rem;color:var(--amber)">${'★'.repeat(p.trophies||0)}</span>
    </div>`).join('') : `<div style="font-size:.75rem;color:var(--muted)">No human players yet. Add yourself to a tournament!</div>`;

  if (hl) hl.innerHTML = hist.length ? hist.slice(0,5).map(h=>`
    <div class="history-item">
      <div class="history-format">${h.date} · ${h.format}</div>
      <div class="history-winner"><i class="fa-solid fa-trophy fa-xs" style="color:var(--gold);margin-right:4px"></i>${h.winner}</div>
    </div>`).join('') : `<div style="font-size:.75rem;color:var(--muted)">No tournaments completed yet.</div>`;
}

// ── Init ────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderMain();
  renderGlobalLeaderboard();
});
</script>
</body>
</html>
