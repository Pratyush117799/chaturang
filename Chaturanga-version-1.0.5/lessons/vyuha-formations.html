<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vyuha Formations (14x14) — Chaturanga</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root{--gold:#c9a84c;--gold-hover:#dfbd5d;--dark:#0f0c07;--dark2:#1a1306;--dark3:#231a08;--border:rgba(201,168,76,0.2);--text:#f5ead0;--muted:#7a6644}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.top-nav{background:var(--dark2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);font-weight:700;text-decoration:none}
.nav-links a{color:var(--text);text-decoration:none;font-size:.9rem;padding:8px 12px;transition:color .2s;font-weight:500}
.nav-links a:hover{color:var(--gold)}
.main-layout{display:flex;flex:1;max-width:1400px;margin:0 auto;width:100%}
.sidebar{width:260px;background:var(--dark2);border-right:1px solid var(--border);padding:24px;display:flex;flex-direction:column;gap:12px}
.sidebar-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.vyuha-btn{background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:12px 16px;text-align:left;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:1rem;transition:all .2s;display:flex;align-items:center;gap:10px}
.vyuha-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}
.vyuha-btn.active{border-color:var(--gold);background:var(--gold);color:var(--dark);font-weight:600}
.content{flex:1;padding:32px;display:flex;flex-direction:column;align-items:center}
.details-panel{max-width:800px;width:100%;margin-bottom:24px;text-align:center}
.details-title{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold);margin-bottom:12px}
.details-desc{font-size:1.1rem;color:#c4a97a;line-height:1.6}
.board-wrap{width:100%;max-width:650px;aspect-ratio:1/1;}
</style>
</head>
<body>

<div class="top-nav">
  <a href="../documentation_hub.html" class="logo">चतुरंग · Vyuha Niti</a>
  <div class="nav-links">
    <a href="../game.html"><i class="fa-solid fa-chess-board"></i> Play Game</a>
    <a href="../lessons.html"><i class="fa-solid fa-graduation-cap"></i> Lessons</a>
    <a href="../documentation_hub.html"><i class="fa-solid fa-book-open"></i> Docs</a>
  </div>
</div>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-title">Formation Formats</div>
    <button class="vyuha-btn" onclick="selectVyuha('chakra', this)">
      <i class="fa-solid fa-dharmachakra"></i> Chakra Vyuha
    </button>
    <button class="vyuha-btn" onclick="selectVyuha('padma', this)">
      <i class="fa-brands fa-pagelines"></i> Padma Vyuha
    </button>
    <button class="vyuha-btn" onclick="selectVyuha('garuda', this)">
      <i class="fa-solid fa-crow"></i> Garuda Vyuha
    </button>
  </div>

  <div class="content">
    <div class="details-panel">
      <h1 class="details-title" id="vyuhaTitle">Select a Formation</h1>
      <p class="details-desc" id="vyuhaDesc">Choose a classical 14x14 Dhanurveda battle formation from the menu on the left to analyze its tactical structure, layout, and historical movement paths.</p>
    </div>
    <div class="board-wrap" id="vyuhaBoard"></div>
  </div>
</div>

<script src="../js/vyuha-engine.js"></script>
<script>
  const renderer = new VyuhaRenderer('vyuhaBoard');

  function selectVyuha(id, btnElement) {
    document.querySelectorAll('.vyuha-btn').forEach(b => b.classList.remove('active'));
    if (btnElement) btnElement.classList.add('active');
    renderer.render(id);
  }

  // Auto-load first
  window.onload = () => {
    const firstBtn = document.querySelector('.vyuha-btn');
    if (firstBtn) {
      selectVyuha('chakra', firstBtn);
    }
  };
</script>
</body>
</html>
