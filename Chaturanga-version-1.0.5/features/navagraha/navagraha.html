<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Navagraha — Today's Modifiers · Chaturanga</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;--dark:#0a0802;--dark2:#14100a;--dark3:#1c1508;
  --border:rgba(201,168,76,.18);--text:#f0e4c8;--muted:#8a7050;
  --excellent:#4ade80;--warn:#f87171;--neutral:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}

/* NAV */
.nav{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:700;text-decoration:none}
.nav-badge{font-size:.62rem;background:rgba(201,168,76,.1);color:var(--gold);
  padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-link{padding:5px 10px;border-radius:6px;font-size:.8rem;color:var(--muted);
  transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:5px}
.nav-link:hover{background:rgba(201,168,76,.08);color:var(--gold)}

/* HERO */
.hero{text-align:center;padding:48px 20px 32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,.08) 0%, transparent 70%);
  pointer-events:none}
.hero-eyebrow{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;
  color:rgba(201,168,76,.4);margin-bottom:10px}
.hero-title{font-family:'Cinzel',serif;font-size:2.4rem;color:var(--gold2);
  font-weight:700;margin-bottom:6px}
.hero-sanskrit{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;color:rgba(201,168,76,.45);margin-bottom:16px}
.hero-date{font-size:.9rem;color:var(--muted);margin-bottom:24px}
.yoga-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;
  border-radius:20px;border:1px solid;font-size:.82rem;font-weight:500}

/* MAIN GRID */
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.panchanga-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
@media(max-width:700px){.panchanga-row{grid-template-columns:repeat(2,1fr)}}

.panch-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;
  padding:16px;text-align:center;transition:border-color .2s}
.panch-card:hover{border-color:var(--gold)}
.pc-symbol{font-size:1.8rem;margin-bottom:6px}
.pc-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);margin-bottom:3px}
.pc-value{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold2);font-weight:600}
.pc-sub{font-size:.72rem;color:var(--muted);margin-top:3px}

/* MODIFIER CARDS */
.section-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);
  margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.modifier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px}
.mod-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;
  padding:18px;position:relative;overflow:hidden;transition:all .2s}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.mod-card.vara::before{background:linear-gradient(90deg,#c9a84c,#e8c96a)}
.mod-card.nakshatra::before{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.mod-card.tithi::before{background:linear-gradient(90deg,#0891b2,#67e8f9)}
.mod-card.ritu::before{background:linear-gradient(90deg,#059669,#6ee7b7)}
.mod-card.yoga.auspicious::before{background:linear-gradient(90deg,#4ade80,#86efac)}
.mod-card.yoga.inauspicious::before{background:linear-gradient(90deg,#f87171,#fca5a5)}
.mc-source{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);margin-bottom:6px}
.mc-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold2);margin-bottom:3px}
.mc-deity{font-size:.75rem;color:var(--muted);margin-bottom:10px;font-style:italic}
.mc-effect{font-size:.82rem;color:#c4a97a;line-height:1.6;border-top:1px solid var(--border);
  padding-top:10px}
.mc-gameplay{display:flex;gap:6px;align-items:flex-start;margin-top:8px;
  background:rgba(201,168,76,.05);border-radius:6px;padding:8px 10px}
.mc-gameplay i{color:var(--gold);flex-shrink:0;margin-top:2px;font-size:.75rem}
.mc-gameplay span{font-size:.75rem;color:var(--gold2);line-height:1.5}

/* BRIEFING */
.briefing-card{background:var(--dark3);border:1px solid var(--border);border-radius:14px;
  padding:28px;margin-bottom:32px;text-align:center;position:relative;overflow:hidden}
.briefing-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 60% at 50% 0%, rgba(201,168,76,.05), transparent);
  pointer-events:none}
.briefing-avatar{width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.1);
  border:2px solid var(--border);margin:0 auto 14px;display:flex;align-items:center;
  justify-content:center;font-size:1.5rem}
.briefing-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;
  color:var(--muted);margin-bottom:8px}
.briefing-text{font-family:'Cormorant Garamond',serif;font-size:1.08rem;
  color:#c4a97a;line-height:1.8;font-style:italic;max-width:680px;margin:0 auto}

/* GAMEPLAY EFFECTS TABLE */
.effects-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:32px}
.effects-table th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);
  color:var(--muted);font-weight:500;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.effects-table td{padding:10px 12px;border-bottom:1px solid rgba(201,168,76,.06);vertical-align:top}
.effects-table tr:hover td{background:rgba(201,168,76,.03)}
.effect-active{color:var(--excellent);font-weight:500}
.effect-inactive{color:rgba(255,255,255,.15)}
.effect-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600}
.badge-active{background:rgba(74,222,128,.15);color:var(--excellent);border:1px solid rgba(74,222,128,.25)}
.badge-inactive{background:rgba(255,255,255,.04);color:rgba(255,255,255,.2)}

/* CTA */
.cta-row{display:flex;gap:12px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.btn{padding:12px 32px;border-radius:8px;border:none;font-family:'Cinzel',serif;
  font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px}
.btn-gold{background:linear-gradient(135deg,#c8960c,#7a5c08);color:#1a0e00}
.btn-gold:hover{background:linear-gradient(135deg,#e8b52a,#c8960c);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.08)}

/* WHEEL (decorative) */
.wheel-wrap{display:flex;justify-content:center;margin:20px 0}
.graha-wheel{width:180px;height:180px;position:relative}
.graha-wheel svg{width:100%;height:100%;animation:wheelSpin 60s linear infinite}
@keyframes wheelSpin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .hero-title{font-size:1.8rem}
  .modifier-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="../../" class="nav-logo">चतुरंग</a>
  <span class="nav-badge">Navagraha v1.0.5.2</span>
  <div class="nav-links">
    <a href="../../"   class="nav-link"><i class="fa-solid fa-chess-board fa-xs"></i> Play</a>
    <a href="panchanga.html" class="nav-link"><i class="fa-solid fa-calendar fa-xs"></i> Panchanga</a>
    <a href="granth.html" class="nav-link"><i class="fa-solid fa-book fa-xs"></i> Granth</a>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-eyebrow">Daily Astronomical Modifiers</div>
  <div class="hero-title">नवग्रह शक्ति</div>
  <div class="hero-sanskrit">Navagraha Shakti — The Nine Planetary Powers</div>
  <div class="hero-date" id="heroDate">Loading…</div>
  <div id="yogaPill"></div>
</div>

<div class="container">

  <!-- Panchanga row -->
  <div class="panchanga-row" id="panchaRow"></div>

  <!-- Drona's briefing -->
  <div class="briefing-card">
    <div class="briefing-avatar"><i class="fa-solid fa-person-chalkboard"></i></div>
    <div class="briefing-label">Acharya Drona's Battle Counsel</div>
    <div class="briefing-text" id="briefingText">Loading…</div>
  </div>

  <!-- Active modifiers -->
  <div class="section-title"><i class="fa-solid fa-star-of-life fa-sm"></i> Today's Active Modifiers</div>
  <div class="modifier-grid" id="modifierGrid"></div>

  <!-- Gameplay effects -->
  <div class="section-title"><i class="fa-solid fa-dice-d6 fa-sm"></i> Gameplay Effects Today</div>
  <table class="effects-table">
    <thead><tr><th>Effect</th><th>Status</th><th>Description</th></tr></thead>
    <tbody id="effectsTable"></tbody>
  </table>

  <!-- CTA -->
  <div class="cta-row">
    <a href="../../" class="btn btn-gold">
      <i class="fa-solid fa-play fa-xs"></i> Play with Today's Modifiers
    </a>
    <a href="panchanga.html" class="btn btn-outline">
      <i class="fa-solid fa-calendar fa-xs"></i> Full Panchanga
    </a>
  </div>

</div>

<script src="../../js/navagraha-engine.js"></script>
<script>
const N = window.ChaturangaNavagraha;
const today = N.getToday();
const gameplay = N.getGameplayModifiers(today);

// Hero
document.getElementById('heroDate').textContent = today.date;
const yogaColor = N.getYogaColor(today);
document.getElementById('yogaPill').innerHTML = `
  <span class="yoga-pill" style="color:${yogaColor};border-color:${yogaColor}30;background:${yogaColor}12">
    <i class="fa-solid fa-circle fa-xs"></i>
    ${today.yoga.name} Yoga — ${today.yoga.quality.charAt(0).toUpperCase()+today.yoga.quality.slice(1)}
    (×${today.yoga.multiplier} dharma)
  </span>`;

// Panchanga row
const panchaItems = [
  { symbol: today.vara.symbol,  label:'Vara',      value: today.vara.name,      sub: today.vara.english + ' · ' + today.vara.planet },
  { symbol: '☽',                label:'Tithi',     value: today.tithi.name,     sub: `Day ${today.tithiNum} · ${today.tithi.quality}` },
  { symbol: '✦',                label:'Nakshatra', value: today.nakshatra.name, sub: today.nakshatra.deity },
  { symbol: '⚷',                label:'Yoga',      value: today.yoga.name,      sub: today.yoga.quality },
  { symbol: '🌿',               label:'Ritu',      value: today.ritu.name,      sub: today.ritu.english + ' · ' + today.ritu.months },
];
document.getElementById('panchaRow').innerHTML = panchaItems.map(p => `
  <div class="panch-card">
    <div class="pc-symbol">${p.symbol}</div>
    <div class="pc-label">${p.label}</div>
    <div class="pc-value">${p.value}</div>
    <div class="pc-sub">${p.sub}</div>
  </div>`).join('');

// Briefing
document.getElementById('briefingText').textContent = N.getBriefing(today);

// Modifier cards
const sourceClass = { vara:'vara', nakshatra:'nakshatra', tithi:'tithi', ritu:'ritu', yoga:'yoga' };
const sourceLabel = { vara:'Vara', nakshatra:'Nakshatra', tithi:'Tithi', ritu:'Ritu', yoga:'Yoga' };
const sourceIcon  = { vara:'fa-sun', nakshatra:'fa-star', tithi:'fa-moon', ritu:'fa-leaf', yoga:'fa-yin-yang' };

function getCardTitle(mod) {
  if (mod.source==='vara')      return today.vara.name;
  if (mod.source==='nakshatra') return today.nakshatra.name;
  if (mod.source==='tithi')     return today.tithi.name;
  if (mod.source==='ritu')      return today.ritu.name;
  if (mod.source==='yoga')      return today.yoga.name + ' Yoga';
  return mod.source;
}
function getCardDeity(mod) {
  if (mod.source==='nakshatra') return today.nakshatra.deity;
  if (mod.source==='vara')      return today.vara.planet;
  if (mod.source==='ritu')      return today.ritu.english;
  if (mod.source==='tithi')     return today.paksha;
  if (mod.source==='yoga')      return today.yoga.quality + ' yoga';
  return '';
}

document.getElementById('modifierGrid').innerHTML = today.modifiers.map(mod => `
  <div class="mod-card ${mod.source} ${mod.source==='yoga'?today.yoga.quality:''}">
    <div class="mc-source"><i class="fa-solid ${sourceIcon[mod.source]||'fa-sparkles'} fa-xs"></i> ${sourceLabel[mod.source]||mod.source}</div>
    <div class="mc-name">${getCardTitle(mod)}</div>
    <div class="mc-deity">${getCardDeity(mod)}</div>
    <div class="mc-effect">${mod.label}</div>
    ${mod.gameplayLabel && mod.gameplayLabel !== mod.label ? `
    <div class="mc-gameplay">
      <i class="fa-solid fa-chess-board fa-xs"></i>
      <span>${mod.gameplayLabel}</span>
    </div>` : ''}
  </div>`).join('');

// Gameplay effects table
const GAMEPLAY_EFFECTS = [
  { key:'rajaExtendedMove',    label:'Surya Diksha',       desc:'Raja may move 2 squares once this game' },
  { key:'doublePromotion',     label:'Guru Prasad',         desc:'Pawn promotion creates 2 Naras' },
  { key:'spyStealth',          label:'Amavasya / Varuna',   desc:'Guptchar spy captures never revealed' },
  { key:'ekadashiVrata',       label:'Vratastha',           desc:'No auto-forfeits · all dharma ×1.5' },
  { key:'allianceDharmaShare', label:'Mitra Yoga',          desc:'Teammate captures also earn you dharma' },
  { key:'huntEscalation',      label:'Mrigashira Hunt',     desc:'Same-type captures escalate in value' },
  { key:'encircleBonus',       label:'Ashlesha Coil',       desc:'+6 dharma for surrounding enemy Raja' },
  { key:'balancedPlayBonus',   label:'Sharad Balance',      desc:'+3 dharma for balanced attack/defence' },
];
document.getElementById('effectsTable').innerHTML = GAMEPLAY_EFFECTS.map(e => `
  <tr>
    <td>${e.label}</td>
    <td><span class="effect-badge ${gameplay[e.key]?'badge-active':'badge-inactive'}">${gameplay[e.key]?'Active':'—'}</span></td>
    <td class="${gameplay[e.key]?'effect-active':'effect-inactive'}">${e.desc}</td>
  </tr>`).join('');
</script>
</body>
</html>
