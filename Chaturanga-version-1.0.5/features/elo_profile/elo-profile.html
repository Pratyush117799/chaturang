<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Chaturanga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── Variables ── */
:root {
  --bg:        #0d0b08;
  --bg2:       #131008;
  --bg3:       #1a1610;
  --bg4:       #221d15;
  --gold:      #c9a84c;
  --gold-lit:  #e8c876;
  --gold-dim:  #6b5a2a;
  --gold-faint:rgba(201,168,76,0.10);
  --text:      #e8dfc8;
  --text2:     #a89e88;
  --text3:     #5e5748;
  --win:       #7abf6e;
  --loss:      #c47a5a;
  --border:    rgba(201,168,76,0.13);
  --r:         10px;
}

/* ── Reset + Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background texture ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(100,60,20,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Nav ── */
.nav {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,11,8,0.85);
  backdrop-filter: blur(8px);
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.06em;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--gold); }
.nav-back svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

.nav-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  color: var(--text3);
  text-transform: uppercase;
}

.nav-reset {
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text3);
  background: none;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 4px 12px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.nav-reset:hover { color: #c47a5a; border-color: rgba(196,122,90,0.35); }

/* ── Main wrapper ── */
.main {
  position: relative; z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Hero: rank + ELO ── */
.hero {
  text-align: center;
  padding: 52px 20px 40px;
  position: relative;
}

.hero-rank-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(38px, 7vw, 58px);
  font-weight: 600;
  letter-spacing: 0.06em;
  background: linear-gradient(135deg, var(--gold-lit) 0%, var(--gold) 50%, #a87c28 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  margin-bottom: 6px;
}

.hero-rank-sub {
  font-size: 15px;
  font-style: italic;
  color: var(--text3);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
}

.hero-elo-wrap {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 26px;
  margin-bottom: 10px;
}

.hero-elo-num {
  font-family: 'Cinzel', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.hero-elo-label {
  font-size: 14px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
}

/* Decorative border flanking the rank */
.hero-ornament {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 18px auto 0;
  max-width: 320px;
  opacity: 0.35;
}
.hero-ornament::before,
.hero-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold));
}
.hero-ornament::after {
  background: linear-gradient(to left, transparent, var(--gold));
}
.hero-ornament-gem {
  width: 6px; height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ── Section header ── */
.section-head {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ── Rating chart ── */
.chart-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 16px 12px;
  margin-bottom: 28px;
}

.chart-empty {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-style: italic;
  color: var(--text3);
  font-size: 15px;
}

/* SVG chart line draw-in animation */
.chart-line {
  stroke-dasharray: 3000;
  stroke-dashoffset: 3000;
  animation: drawLine 1.4s ease-out forwards;
}
@keyframes drawLine {
  to { stroke-dashoffset: 0; }
}

/* ── Stats grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px 14px;
  text-align: center;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: rgba(201,168,76,0.28); }

.stat-val {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 5px;
}
.stat-val.stat-peak { color: var(--gold-lit); }

.stat-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── Bot breakdown ── */
.breakdown-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 28px;
}

.breakdown-row {
  display: grid;
  grid-template-columns: 90px 1fr 60px;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.breakdown-row:last-child { margin-bottom: 0; }

.breakdown-band { font-size: 13px; color: var(--text2); }

.breakdown-bar-bg {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  gap: 0;
}
.breakdown-bar-w {
  height: 100%;
  background: var(--win);
  border-radius: 4px 0 0 4px;
  transition: width 0.8s ease;
}
.breakdown-bar-l {
  height: 100%;
  background: var(--loss);
  border-radius: 0 4px 4px 0;
  transition: width 0.8s ease;
}
.breakdown-wl {
  font-size: 12px;
  color: var(--text3);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.breakdown-empty {
  color: var(--text3);
  font-style: italic;
  font-size: 14px;
  padding: 8px 0;
}

/* ── Recent games ── */
.games-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.game-row {
  display: grid;
  grid-template-columns: 36px 1fr 80px 70px 60px;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 14px;
  transition: background 0.15s;
}
.game-row:hover { background: rgba(201,168,76,0.04); }
.game-row:last-child { border-bottom: none; }

.game-row-head {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  background: var(--bg3);
  padding: 8px 18px;
  border-bottom: 1px solid var(--border);
}

.game-result {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
}
.game-result.win  { color: var(--win);  background: rgba(122,191,110,0.12); }
.game-result.loss { color: var(--loss); background: rgba(196,122,90,0.12);  }

.game-opp { color: var(--text2); }
.game-opp span { color: var(--text3); font-size: 12px; }

.game-tc {
  color: var(--text3);
  font-size: 12px;
  text-align: right;
}

.game-delta {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  text-align: right;
}
.game-delta.pos { color: var(--win);  }
.game-delta.neg { color: var(--loss); }

.game-newelo {
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  text-align: right;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 70px 20px;
}
.empty-state h2 {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  color: var(--gold-dim);
  margin-bottom: 10px;
  font-weight: 400;
}
.empty-state p {
  color: var(--text3);
  font-style: italic;
  margin-bottom: 28px;
}
.empty-cta {
  display: inline-block;
  padding: 12px 30px;
  background: var(--gold-faint);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--gold);
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  transition: background 0.2s, border-color 0.2s;
}
.empty-cta:hover {
  background: rgba(201,168,76,0.15);
  border-color: rgba(201,168,76,0.35);
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="nav-back" href="../../">
    <svg viewBox="0 0 16 16"><polyline points="10 4 6 8 10 12"/></svg>
    Return to battle
  </a>
  <span class="nav-title">Chronicle</span>
  <button class="nav-reset" onclick="confirmReset()">Reset chronicle</button>
</nav>

<!-- Main -->
<main class="main" id="main">
  <!-- content injected by JS -->
</main>

<script>
// ── Data layer (reads localStorage directly, no engine dependency) ──────────

const STORAGE_KEY = 'chaturanga_elo_v2';
const DEFAULT_ELO = 1000;

const RANKS = [
  { min: 1400, title: 'Chakravarti',   sub: 'Emperor of the Ashtāpada'    },
  { min: 1300, title: 'Drona-Shishya', sub: 'Equal of the Acharya himself' },
  { min: 1200, title: 'Rathasena',     sub: 'Lord of the war chariots'     },
  { min: 1100, title: 'Maharathi',     sub: 'Great warrior of the age'     },
  { min: 1000, title: 'Senapati',      sub: 'Commander of armies'          },
  { min:  900, title: 'Yoddha',        sub: 'Proven in battle'             },
  { min:  800, title: 'Sainik',        sub: 'Soldier of the realm'         },
  { min:    0, title: 'Shishya',       sub: 'Student of the ancient game'  },
];

const TC_LABELS = { chirantan: 'Chirantan', tez: 'Tez 5+0', atichitr: 'Atichitr 1+3' };

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return { current: DEFAULT_ELO, peak: DEFAULT_ELO, games: 0, wins: 0, losses: 0, history: [] };
}

function getRank(elo) {
  for (const r of RANKS) if (elo >= r.min) return r;
  return RANKS[RANKS.length - 1];
}

function getBands(history) {
  const b = { '100–299': { w:0,l:0 }, '300–499': { w:0,l:0 }, '500–699': { w:0,l:0 }, '700–1000': { w:0,l:0 } };
  for (const g of history) {
    const k = g.botELO < 300 ? '100–299' : g.botELO < 500 ? '300–499' : g.botELO < 700 ? '500–699' : '700–1000';
    if (g.result === 'W') b[k].w++; else b[k].l++;
  }
  return b;
}

function relativeDate(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 2)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

// ── Rating chart ─────────────────────────────────────────────────────────────

function buildChart(history) {
  if (!history || history.length < 2) {
    return '<div class="chart-empty">Play two or more games to see your battle chronicle unfold</div>';
  }

  // Chronological order, last 40 games
  const data = history.slice(0, 40).reverse();

  const VW = 800, VH = 170;
  const PL = 52, PR = 16, PT = 18, PB = 32;
  const CW = VW - PL - PR, CH = VH - PT - PB;

  const elos   = data.map(d => d.newELO);
  const minRaw = Math.min(...elos);
  const maxRaw = Math.max(...elos);
  const pad    = Math.max((maxRaw - minRaw) * 0.12, 30);
  const yMin   = Math.floor((minRaw - pad) / 25) * 25;
  const yMax   = Math.ceil((maxRaw + pad) / 25) * 25;

  const xPos = i  => PL + (i / Math.max(data.length - 1, 1)) * CW;
  const yPos = elo => PT + (1 - (elo - yMin) / (yMax - yMin)) * CH;

  // Line path
  const pts      = data.map((d, i) => `${xPos(i).toFixed(1)},${yPos(d.newELO).toFixed(1)}`);
  const linePath = `M ${pts.join(' L ')}`;

  // Area fill
  const areaPath = `M ${PL},${PT + CH} L ${pts.join(' L ')} L ${xPos(data.length-1).toFixed(1)},${PT + CH} Z`;

  // Baseline (1000) y
  const baseY = yPos(1000).toFixed(1);

  // Y-axis ticks
  const tickStep = ((yMax - yMin) / 4 < 25) ? 25 : Math.ceil((yMax - yMin) / 4 / 25) * 25;
  const ticks = [];
  for (let v = Math.ceil(yMin / tickStep) * tickStep; v <= yMax; v += tickStep) {
    ticks.push({ v, y: yPos(v).toFixed(1) });
  }

  // Dots
  const dots = data.map((d, i) => {
    const cx = xPos(i).toFixed(1);
    const cy = yPos(d.newELO).toFixed(1);
    const fill   = d.result === 'W' ? '#7abf6e' : '#c47a5a';
    const stroke = d.result === 'W' ? '#3d7038' : '#7a3a28';
    return `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${fill}" stroke="${stroke}" stroke-width="1" opacity="0.9"/>`;
  }).join('');

  return `<svg viewBox="0 0 ${VW} ${VH}" width="100%" style="display:block;overflow:visible">
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.01"/>
    </linearGradient>
    <clipPath id="chartClip">
      <rect x="${PL}" y="${PT - 2}" width="${CW}" height="${CH + 4}"/>
    </clipPath>
  </defs>

  <!-- Grid lines -->
  ${ticks.map(t => `<line x1="${PL}" y1="${t.y}" x2="${PL + CW}" y2="${t.y}" stroke="#221d15" stroke-width="1"/>`).join('')}

  <!-- Baseline 1000 -->
  <line x1="${PL}" y1="${baseY}" x2="${PL + CW}" y2="${baseY}" stroke="#6b5a2a" stroke-width="1" stroke-dasharray="5 4" opacity="0.7"/>
  <text x="${PL - 6}" y="${baseY}" fill="#6b5a2a" font-size="10" text-anchor="end" dominant-baseline="central" font-family="Crimson Pro, Georgia, serif">1000</text>

  <!-- Y axis labels -->
  ${ticks.filter(t => Math.abs(t.v - 1000) > 15).map(t =>
    `<text x="${PL - 6}" y="${t.y}" fill="#3e3830" font-size="10" text-anchor="end" dominant-baseline="central" font-family="Crimson Pro, Georgia, serif">${t.v}</text>`
  ).join('')}

  <!-- Area fill -->
  <path d="${areaPath}" fill="url(#areaGrad)" clip-path="url(#chartClip)"/>

  <!-- Rating line (animated draw-in) -->
  <path d="${linePath}" fill="none" stroke="#c9a84c" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round" class="chart-line" clip-path="url(#chartClip)"/>

  <!-- Data dots -->
  <g clip-path="url(#chartClip)">${dots}</g>

  <!-- X axis labels -->
  <text x="${PL}" y="${VH - 4}" fill="#3e3830" font-size="10" text-anchor="middle" font-family="Crimson Pro, Georgia, serif">Earlier</text>
  <text x="${xPos(data.length - 1).toFixed(1)}" y="${VH - 4}" fill="#3e3830" font-size="10" text-anchor="middle" font-family="Crimson Pro, Georgia, serif">Latest</text>
  ${data.length > 3 ? `<text x="${xPos(Math.floor(data.length/2)).toFixed(1)}" y="${VH - 4}" fill="#3e3830" font-size="10" text-anchor="middle" font-family="Crimson Pro, Georgia, serif">${data.length} games</text>` : ''}
</svg>`;
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const d     = loadData();
  const rank  = getRank(d.current);
  const main  = document.getElementById('main');

  if (d.games === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <h2>Your chronicle is unwritten</h2>
        <p>Begin your first battle to claim your rank.</p>
        <a class="empty-cta" href="../../">Enter the Ashtāpada</a>
      </div>`;
    return;
  }

  const wr     = d.games > 0 ? Math.round((d.wins / d.games) * 100) : 0;
  const bands  = getBands(d.history);
  const recent = d.history.slice(0, 15);

  // ── Bot breakdown rows ──
  const bandKeys   = Object.keys(bands);
  const hasAnyGame = bandKeys.some(k => bands[k].w + bands[k].l > 0);

  let breakdownHTML = '';
  if (!hasAnyGame) {
    breakdownHTML = '<div class="breakdown-empty">No breakdown yet</div>';
  } else {
    breakdownHTML = bandKeys.map(band => {
      const { w, l } = bands[band];
      const total = w + l;
      if (total === 0) return '';
      const wPct = Math.round((w / total) * 100);
      const lPct = 100 - wPct;
      return `<div class="breakdown-row">
        <span class="breakdown-band">${band}</span>
        <div class="breakdown-bar-bg">
          <div class="breakdown-bar-w" style="width:${wPct}%"></div>
          <div class="breakdown-bar-l" style="width:${lPct}%"></div>
        </div>
        <span class="breakdown-wl">${w}W ${l}L</span>
      </div>`;
    }).join('');
  }

  // ── Recent games rows ──
  const gamesHTML = recent.map(g => {
    const sign  = g.delta >= 0 ? '+' : '';
    const tc    = TC_LABELS[g.tc] || g.tc || 'Chirantan';
    const ago   = g.ts ? relativeDate(g.ts) : '—';
    return `<div class="game-row">
      <div class="game-result ${g.result === 'W' ? 'win' : 'loss'}">${g.result}</div>
      <div class="game-opp">vs bot ELO ${g.botELO} <span>${ago}</span></div>
      <div class="game-tc">${tc}</div>
      <div class="game-delta ${g.delta >= 0 ? 'pos' : 'neg'}">${sign}${g.delta}</div>
      <div class="game-newelo">${g.newELO}</div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <!-- Hero -->
    <div class="hero">
      <div class="hero-rank-title" id="rankTitle">${rank.title}</div>
      <div class="hero-rank-sub">${rank.sub}</div>
      <div class="hero-elo-wrap">
        <div class="hero-elo-num" id="eloNum">${d.current}</div>
        <div class="hero-elo-label">ELO</div>
      </div>
      <div class="hero-ornament"><div class="hero-ornament-gem"></div></div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <div class="section-head">Rating chronicle</div>
      ${buildChart(d.history)}
    </div>

    <!-- Stats grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val stat-peak">${d.peak}</div>
        <div class="stat-label">Peak ELO</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${d.games}</div>
        <div class="stat-label">Battles fought</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${d.wins} – ${d.losses}</div>
        <div class="stat-label">Won – Lost</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${wr}%</div>
        <div class="stat-label">Win rate</div>
      </div>
    </div>

    <!-- Bot breakdown -->
    <div class="breakdown-wrap">
      <div class="section-head">Performance by opponent strength</div>
      ${breakdownHTML}
    </div>

    <!-- Recent games -->
    <div>
      <div class="section-head" style="margin-bottom:0">Recent battles</div>
      <div class="games-wrap">
        <div class="game-row game-row-head">
          <div></div>
          <div>Opponent</div>
          <div>Format</div>
          <div style="text-align:right">Δ ELO</div>
          <div style="text-align:right">New ELO</div>
        </div>
        ${gamesHTML}
      </div>
    </div>
  `;

  // Animate ELO number counting up
  animateCount('eloNum', 0, d.current, 900);
}

function animateCount(id, from, to, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  const start  = performance.now();
  const range  = to - from;
  function step(now) {
    const elapsed = Math.min(1, (now - start) / duration);
    const ease    = 1 - Math.pow(1 - elapsed, 3); // cubic ease-out
    el.textContent = Math.round(from + range * ease);
    if (elapsed < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function confirmReset() {
  if (confirm('This will permanently erase your entire battle chronicle. Are you certain?')) {
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    render();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
