<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #111; color: white; font-family: sans-serif; }
    .container {
      position: relative;
      width: 800px; height: 800px;
      margin: 20px auto;
      border: 2px solid cyan;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      background-image: url('board.png');
      background-repeat: no-repeat;
      width: 100%; height: 100%;
      opacity: 0.7;
    }
    .grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      pointer-events: none;
    }
    .grid div { border: 1px solid rgba(0, 255, 255, 0.5); }
    .controls { text-align: center; margin-top: 20px; }
    input[type=range] { width: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg" id="bg"></div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="controls">
    <label>Size: <input type="range" id="sz" min="100" max="150" step="0.1" value="100"> <span id="szL">100</span>%</label><br>
    <label>Pos X: <input type="range" id="px" min="-50" max="150" step="0.1" value="50"> <span id="pxL">50</span>%</label><br>
    <label>Pos Y: <input type="range" id="py" min="-50" max="150" step="0.1" value="50"> <span id="pyL">50</span>%</label>
  </div>
  <script>
    const bg = document.getElementById('bg');
    const sz = document.getElementById('sz'), szL = document.getElementById('szL');
    const px = document.getElementById('px'), pxL = document.getElementById('pxL');
    const py = document.getElementById('py'), pyL = document.getElementById('pyL');
    
    for(let i=0; i<64; i++) document.getElementById('grid').innerHTML += '<div></div>';
    
    function update() {
      bg.style.backgroundSize = sz.value + '% ' + sz.value + '%';
      bg.style.backgroundPosition = px.value + '% ' + py.value + '%';
      szL.textContent = sz.value; pxL.textContent = px.value; pyL.textContent = py.value;
    }
    sz.oninput = px.oninput = py.oninput = update;
    update();
  </script>
</body>
</html>
